name: Claude Assist

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  assist:
    if: contains(github.event.comment.body, '@claude')
    name: Respond to @claude mention
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main --depth=50 2>/dev/null || true

      - name: Prepare context
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          IS_PR: ${{ github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment' }}
        run: |
          # Strip @claude from the comment to get the question
          echo "$COMMENT_BODY" | sed 's/@claude//g' | xargs > /tmp/prompt.txt

          # Attach diff if this is a PR comment
          if [ "$IS_PR" = "true" ]; then
            git diff origin/main...HEAD -- \
              '*.ts' '*.tsx' '*.jsx' '*.js' '*.py' \
              ':!*.lock' ':!node_modules' \
              | head -c 6000 > /tmp/pr.diff
          else
            touch /tmp/pr.diff
          fi

      - name: Ask Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          prompt = open("/tmp/prompt.txt").read().strip()
          diff = open("/tmp/pr.diff").read().strip()

          user_msg = prompt
          if diff:
              user_msg += f"\n\nCurrent PR diff for context:\n```\n{diff}\n```"

          payload = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "system": (
                  "You are Claude, an AI assistant embedded in GitHub Actions CI "
                  "for a Next.js + Python Flask DNA synthesis platform. "
                  "Answer questions, review code, suggest fixes, or explain errors concisely. "
                  "Use markdown for code blocks."
              ),
              "messages": [{"role": "user", "content": user_msg}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              }
          )

          with urllib.request.urlopen(req) as res:
              body = json.loads(res.read())

          answer = body["content"][0]["text"]
          open("/tmp/answer.md", "w").write(answer)
          print("Claude answer written successfully.")
          PYEOF

      - name: Post Claude reply
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const answer = fs.readFileSync('/tmp/answer.md', 'utf8');
            const actor = context.payload.comment.user.login;
            const body = `**@${actor}** — 🤖 Claude says:\n\n${answer}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
